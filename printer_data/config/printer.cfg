[include mainsail.cfg]
[include macros.cfg]
[include BTT_TFT35.cfg]

[force_move]
enable_force_move: True

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_12001E000450415339373620-if00

[virtual_sdcard]
path: /home/darth/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: cartesian
max_velocity: 500
max_accel: 6700
max_z_velocity: 5
max_z_accel: 100

# [mcu btt_adxl345]
# serial: /dev/serial/by-id/usb-Klipper_rp2040_454741505B8B687A-if00

# [adxl345]
# cs_pin: btt_adxl345:gpio9
# spi_bus: spi1_gpio8_gpio11_gpio10
# #spi_software_sclk_pin: btt_adxl345:gpio10
# #spi_software_mosi_pin: btt_adxl345:gpio11
# #spi_software_miso_pin: btt_adxl345:gpio8
# axes_map: -x,-y,-z

# [resonance_tester]
# probe_points: 100, 100, 20
# accel_chip: adxl345

[input_shaper]
shaper_freq_x: 59.4
shaper_type_x: mzv
shaper_freq_y: 92.4
shaper_type_y: 2hump_ei

# ------------------------------------------------------------
# X Axis
# Marlin: INVERT_X_DIR true  → dir_pin: !PB12  (inverted) ✓
# Marlin: 100 steps/mm       → rotation_distance = (200×16)/100 = 32
#         Prusa MK3 uses 16-tooth GT2 pulleys (NOT 20T as Ender-style)
# ------------------------------------------------------------
[stepper_x]
step_pin: PB13
dir_pin: !PB12              # INVERT_X_DIR true → inverted ✓
enable_pin: !PB14
microsteps: 16
rotation_distance: 32       # [FIXED from 40] — 16T pulley × 2mm pitch = 32mm/rev
endstop_pin: ^PC0           # X-MIN header (USE_XMIN_PLUG + ENDSTOPPULLUPS)
position_endstop: 0
position_min: 0             # Marlin X_MIN_POS 0
position_max: 250           # Marlin X_BED_SIZE 250
homing_speed: 50
endstop_pin: tmc2209_stepper_x:virtual_endstop
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PC11
diag_pin: ^PC0
tx_pin: PC10
uart_address: 0
run_current: 0.850          # LDO-42STH40-1004ASC: 1.0A rated RMS, 4.1Ω "Cool Power" winding
                            # 85% of rated = 0.850A — good torque/heat balance in Klipper
                            # (Marlin ran 500mA which is very conservative for this motor)
hold_current: 0.400         # ~47% of run_current; keeps motor positioned without excess heat
# stealthchop_threshold: 999999  # Marlin STEALTHCHOP_XY enabled
driver_SGTHRS: 150

# ------------------------------------------------------------
# Y Axis
# Marlin: INVERT_Y_DIR false → dir_pin: PB2  (NOT inverted)
#   *** CORRECTED: generic template had !PB2 (inverted) — WRONG ***
# Marlin: 100 steps/mm       → rotation_distance = 32 (same as X)
# Marlin: Y_MIN_POS = -4     (Bear frame parks slightly behind bed)
# ------------------------------------------------------------
[stepper_y]
step_pin: PB10
dir_pin: PB2                # [FIXED from !PB2] — INVERT_Y_DIR false → NOT inverted
enable_pin: !PB11
microsteps: 16
rotation_distance: 32       # [FIXED from 40] — 16T pulley × 2mm pitch = 32mm/rev
endstop_pin: ^PC1           # Y-MIN header (USE_YMIN_PLUG + ENDSTOPPULLUPS)
position_endstop: -4        # Marlin Y_MIN_POS -4
position_min: -4            # [FIXED from -2]
position_max: 210           # Marlin Y_BED_SIZE 210
homing_speed: 50
endstop_pin: tmc2209_stepper_y:virtual_endstop
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PC11
diag_pin: ^PC1
tx_pin: PC10
uart_address: 2
run_current: 0.850          # LDO-42STH40-1004ASC: same motor as X — 0.850A (85% of 1.0A rated)
hold_current: 0.400         # ~47% of run_current
# stealthchop_threshold: 999999  # Marlin STEALTHCHOP_XY enabled
driver_SGTHRS: 150

# ------------------------------------------------------------
# Z Axis
# Marlin: INVERT_Z_DIR true  → dir_pin: !PC5  (inverted)
#   *** CORRECTED: generic template had PC5 (not inverted) — WRONG ***
# Marlin: 400 steps/mm       → rotation_distance = (200×16)/400 = 8 ✓
# ------------------------------------------------------------
[stepper_z]
step_pin: PB0
dir_pin: !PC5               # [FIXED from PC5] — INVERT_Z_DIR true → inverted
enable_pin: !PB1
microsteps: 16
rotation_distance: 8        # T8 lead screw: 2mm pitch × 4 starts = 8mm/rev ✓
endstop_pin: probe:z_virtual_endstop  # USE_PROBE_FOR_Z_HOMING
position_min: -2            # Allow negative for z_offset calibration
position_max: 220           # Marlin Z_MAX_POS 210
homing_speed: 13
endstop_pin: probe: z_virtual_endstop
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.800          # [FIXED from 0.580] — Marlin Z_CURRENT 800mA
hold_current: 0.400         # Marlin HOLD_MULTIPLIER 0.5 × 800mA
# stealthchop_threshold: 999999  # Marlin STEALTHCHOP_Z enabled
driver_SGTHRS: 60

# ------------------------------------------------------------
# Extruder
# Marlin: INVERT_E0_DIR false → dir_pin: PB4  (NOT inverted)
#   *** CORRECTED: generic template had !PB4 (inverted) — WRONG ***
# Marlin: E0 steps/mm = 280  → rotation_distance = (200×16)/280 = 11.43 ✓
# Marlin: TEMP_SENSOR_0 = 5  → ATC Semitec 104GT-2 / 104NT-4-R025H42G
# ------------------------------------------------------------
[extruder]
step_pin: PB3
dir_pin: PB4                # [FIXED from !PB4] — INVERT_E0_DIR false → NOT inverted
enable_pin: !PD1
microsteps: 16
rotation_distance: 11.43    # Marlin E0 280 steps/mm → (200×16)/280 = 11.43 ✓
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 200.0

heater_pin: PC8             # HE0 header
# Marlin TEMP_SENSOR_0 = 5 = ATC Semitec 104GT-2 / 104NT-4-R025H42G
# Change to "ATC Semitec 104NT-4-R025H42G" if you have the newer MK3S+ hotend
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA0             # TH0 header

# Marlin DEFAULT_Kp/Ki/Kd from your Configuration.h:
# Re-run PID_CALIBRATE HEATER=extruder TARGET=215 — Klipper PID ≠ Marlin PID
#control: pid
#pid_Kp: 26.877
#pid_Ki: 1.877
#pid_Kd: 96.220
min_temp: 5                 # Marlin HEATER_0_MINTEMP 5
max_temp: 290               # Marlin HEATER_0_MAXTEMP 305 minus HOTEND_OVERSHOOT 15
min_extrude_temp: 170
pressure_advance: 0.05      # Tune after basic calibration is complete

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
# LDO-42STH40-1004AH: 1.0A rated, ~6.5Ω winding, Class H (180°C) insulation
# Higher resistance than the X/Y ASC motors (4.1Ω) → more heat per amp.
# Bondtech 3:1 gearing multiplies torque, so full rated current is not needed.
# 70% of rated = 0.700A: good grip, keeps coil dissipation ~3.2W (vs ~4.7W at 0.850A).
# You can go up to 0.800A if you experience skipping under load, but start here.
run_current: 0.700
hold_current: 0.350         # 50% of run_current — motor is stationary most of print time
#
# *** STEALTHCHOP WARNING ***
# Your Marlin config had STEALTHCHOP_E enabled, but in Klipper stealthchop on
# the extruder causes force-feedback issues that degrade Pressure Advance tuning.
# It is STRONGLY recommended to leave it disabled on the extruder (set to 0).
stealthchop_threshold: 0    # Disabled — use spreadCycle for better PA response

# ------------------------------------------------------------
# Heated Bed
# Marlin: TEMP_SENSOR_BED = 1 → EPCOS 100kΩ B57560G104F
# ------------------------------------------------------------
[heater_bed]
heater_pin: PC9             # HB header
sensor_type: ATC Semitec 104NT-4-R025H42G # EPCOS 100K B57560G104F  # Marlin TEMP_SENSOR_BED 1 = EPCOS 100kΩ ✓
sensor_pin: PC4             # TB header

# Run PID_CALIBRATE HEATER=heater_bed TARGET=60 to generate Klipper-specific values
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 5                 # Marlin BED_MINTEMP 5
max_temp: 125               # Marlin BED_MAXTEMP 135 minus BED_OVERSHOOT 10

# ------------------------------------------------------------
# PINDA Probe
# Marlin: FIX_MOUNTED_PROBE
#         Z_MIN_PROBE_PIN PC14     ✓ confirmed match
#         NOZZLE_TO_PROBE_OFFSET { 23, 5, -0.5 }
#
# Z offset sign convention differs between Marlin and Klipper:
#   Marlin -0.5 (probe triggers below nozzle) → Klipper positive z_offset
#   Run PROBE_CALIBRATE to find your actual value.
# ------------------------------------------------------------
[probe]
pin: ^PC14                  # Marlin Z_MIN_PROBE_PIN PC14 ✓; ^ = pullup (ENDSTOPPULLUPS)
x_offset: 23.0              # Marlin NOZZLE_TO_PROBE_OFFSET X = 23 ✓
y_offset: 5.0               # Marlin NOZZLE_TO_PROBE_OFFSET Y = 5 ✓
#z_offset: 1.0               # Placeholder — MUST run PROBE_CALIBRATE before printing
speed: 4.0                  # Marlin Z_PROBE_FEEDRATE_SLOW = (4*60)/2 mm/min ≈ 2 mm/s
                            # Using 4 mm/s as a comfortable Klipper starting point
samples: 3                  # Marlin MULTIPLE_PROBING 2 + EXTRA_PROBING 1 = 3 samples
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.050
samples_tolerance_retries: 3

[safe_z_home]
# Move nozzle to bed center: bed center (125,105) minus probe offset (23,5) = (102,100)
home_xy_position: 12, 6
speed: 80
z_hop: 5
z_hop_speed: 10

# ------------------------------------------------------------
# Bed Mesh  (Marlin: AUTO_BED_LEVELING_BILINEAR, 5×5 implied)
# mesh_min/max are PROBE positions, not nozzle positions
# ------------------------------------------------------------
[bed_mesh]
speed: 100
horizontal_move_z: 5
mesh_min: 25, 6             # Probe pos: nozzle at (2,1) + offset (23,5); left/front margin
mesh_max: 228, 210          # Probe pos: nozzle at (205,205) + offset (23,5)
probe_count: 5, 5
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0


# ------------------------------------------------------------
# Fans
# ------------------------------------------------------------
[fan]
pin: PC6                    # Part cooling (M106/M107)

[heater_fan hotend_fan]
pin: PC7                    # Heatbreak cooling fan
heater: extruder
heater_temp: 50.0

[heater_fan controller_fan]
pin: PB15                   # Electronics cooling fan
heater: heater_bed
heater_temp: 45.0

# ------------------------------------------------------------
# Filament Runout Sensor
# Marlin: FILAMENT_RUNOUT_SENSOR
#         FIL_RUNOUT_STATE    HIGH     (HIGH = filament NOT present)
#         FIL_RUNOUT_PULLDOWN          (internal pull-down, not pull-up)
#
# Klipper pin notation:
#   ~  = enable internal pull-down resistor
#   no ! = don't invert (pin HIGH triggers sensor = matches FIL_RUNOUT_STATE HIGH)
#
# *** FIXED: generic template had ^PC15 (pull-up, wrong bias resistor)
#            corrected to ~PC15 (pull-down, matches Marlin config) ***
# ------------------------------------------------------------
[filament_switch_sensor filament_sensor]
switch_pin: ~PC15           # E0-STOP; ~ = pull-down (Marlin FIL_RUNOUT_PULLDOWN)
                            # No ! invert: HIGH = runout (Marlin FIL_RUNOUT_STATE HIGH)
pause_on_runout: True
runout_gcode:
    PAUSE
    M117 Filament runout!
insert_gcode:
    M117 Filament inserted


# ------------------------------------------------------------
# EXP1 Board Pin Aliases
# ------------------------------------------------------------
[board_pins]
aliases:
    EXP1_1=PB5, EXP1_3=PA9,  EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15,EXP1_4=<RST>,EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>,
    STATUS_PIN=PD8

