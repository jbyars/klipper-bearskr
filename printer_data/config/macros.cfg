# ------------------------------------------------------------
# Macros
# ------------------------------------------------------------

[gcode_macro START_PRINT]
description: Prusa-style start sequence
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(215)|float %}
    M117 Heating...
    M140 S{BED_TEMP}
    M104 S150
    G28
    BED_MESH_CALIBRATE
    G1 Z5 F3000
    M190 S{BED_TEMP}
    M109 S{EXTRUDER_TEMP}
    M117 Purging...
    G92 E0
    G1 X0 Y-4 Z0.3 F3000
    G1 X60 E9 F1000
    G1 X100 E12 F1000
    G92 E0
    M117 Printing...

[gcode_macro END_PRINT]
description: End sequence — retract, park, cool, disable
gcode:
    M117 Done
    G91
    G1 E-2 F2700
    G1 Z10 F3000
    G90
    G1 X0 Y210 F3000
    M104 S0
    M140 S0
    M106 S0
    M84

[gcode_macro PAUSE]
description: Pause the print
rename_existing: BASE_PAUSE
gcode:
    {% set X = params.X|default(230)|float %}
    {% set Y = params.Y|default(200)|float %}
    {% set Z = params.Z|default(10)|float %}
    {% set E = params.E|default(1)|float %}
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 E-{E} F2100
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F6000

[gcode_macro RESUME]
description: Resume the print
rename_existing: BASE_RESUME
gcode:
    {% set E = params.E|default(1)|float %}
    G91
    G1 E{E} F2100
    G90
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
description: Cancel the print
rename_existing: BASE_CANCEL_PRINT
gcode:
    END_PRINT
    BASE_CANCEL_PRINT

[gcode_macro LOAD_FILAMENT]
gcode:
    {% set TEMP = params.TEMP|default(215)|float %}
    M109 S{TEMP}
    G91
    G1 E50 F400
    G1 E30 F150
    G90

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set TEMP = params.TEMP|default(215)|float %}
    M109 S{TEMP}
    G91
    G1 E5 F300
    G1 E-80 F800
    G90


# ============================================================
# Slicer start/end G-code:
#   Start: START_PRINT BED_TEMP={first_layer_bed_temperature} EXTRUDER_TEMP={first_layer_temperature}
#   End:   END_PRINT
# ============================================================